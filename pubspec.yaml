name: keeper
description: Keeper - expressive AMOLED spider care tracker.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^8.0.6
  file_selector: ^1.0.3
  archive: ^3.6.1
  image: ^4.2.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  image_path: assets/images/app_icon.png
  min_sdk_android: 21
